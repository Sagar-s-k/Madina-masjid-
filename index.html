<!DOCTYPE html>
<html>
<head>
<title>Madina Masjid</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef5f3;
    text-align: center;
}

header {
    background: #0b5d3b;
    color: white;
    padding: 20px;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.gallery img {
    width: 30%;
    margin: 8px;
    border-radius: 10px;
}

nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0b5d3b;
    display: flex;
    justify-content: space-around;
    padding: 10px;
}

nav button {
    background: none;
    border: none;
    color: white;
    font-size: 14px;
}

.lang-btn {
    margin-top: 10px;
    padding: 5px 10px;
}
</style>

</head>

<body>

<header>
<h1 id="title">🕌 Madina Masjid</h1>
<p id="tagline">A place of peace and prayer</p>
<button class="lang-btn" onclick="toggleLang()">🌍 Change Language</button>
</header>

<div id="home" class="section active">
<h2 id="aboutTitle">About</h2>
<p id="aboutText">Madina Masjid is a sacred place for prayers and unity.</p>
</div>

<div id="timing" class="section">
<h2>🕒 Namaz Timings</h2>
<p id="fajr">Loading...</p>
<p id="dhuhr">Loading...</p>
<p id="asr">Loading...</p>
<p id="maghrib">Loading...</p>
<p id="isha">Loading...</p>
</div>

<div id="gallery" class="section">
<h2>📸 Gallery</h2>
<div class="gallery">
<img src="https://i.ibb.co/23X1Gd8Y/Screenshot-20260326-085346.webp">
<img src="https://i.ibb.co/s9z23tYk/Screenshot-20260326-085354.webp">
<img src="https://i.ibb.co/fdxFxHvp/Screenshot-20260326-085402.webp">
</div>
</div>

<div id="location" class="section">
<h2>📍 Location</h2>
<a href="https://maps.app.goo.gl/Lyiqp3gc8xWF9gTc8?g_st=ac">Open Map</a>
</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('timing')">Timings</button>
<button onclick="show('gallery')">Gallery</button>
<button onclick="show('location')">Location</button>
</nav>

<script>
// Navigation
function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Prayer API
fetch("https://api.aladhan.com/v1/timingsByCity?city=Bangalore&country=India&method=2")
.then(res => res.json())
.then(data => {
    let t = data.data.timings;
    document.getElementById("fajr").innerText = "Fajr: " + t.Fajr;
    document.getElementById("dhuhr").innerText = "Dhuhr: " + t.Dhuhr;
    document.getElementById("asr").innerText = "Asr: " + t.Asr;
    document.getElementById("maghrib").innerText = "Maghrib: " + t.Maghrib;
    document.getElementById("isha").innerText = "Isha: " + t.Isha;
});

// Language toggle
let eng = true;
function toggleLang() {
    eng = !eng;
    if (!eng) {
        document.getElementById("title").innerText = "🕌 مدینہ مسجد";
        document.getElementById("tagline").innerText = "امن اور عبادت کی جگہ";
        document.getElementById("aboutTitle").innerText = "معلومات";
        document.getElementById("aboutText").innerText = "مدینہ مسجد نماز اور اتحاد کی مقدس جگہ ہے۔";
    } else {
        document.getElementById("title").innerText = "🕌 Madina Masjid";
        document.getElementById("tagline").innerText = "A place of peace and prayer";
        document.getElementById("aboutTitle").innerText = "About";
        document.getElementById("aboutText").innerText = "Madina Masjid is a sacred place for prayers and unity.";
    }
}
</script>

</body>
</html>
